<style>

body{
font-family:Helvetica, Arial;
margin:0;
background:#FFC5C5;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgb(235, 188, 172);
border-bottom:2px solid #20376D;
position:sticky;
top:0;
z-index:2000;
background:#607AB4;
}

.logo{
width:50px;
height:50px;
}

.logo img{
width:100%;
height:100%;
}

/* MENU */

.menu{
display:flex;
gap:20px;
align-items:center;
}

.nav-button{

padding:12px 30px;
font-size:18px;
border-radius:8px;
border:2px solid #20376D;

text-decoration:none;
color:#20376D;
background:#FFC5C5;

transition:0.3s;
}

.nav-button:hover{

background:#EFF2F7;
color:black;

}

nav a{
text-decoration:none;
color:#20376D;
}

.dropdown{
position:relative;
display:flex;
align-items:center;
}

.dropdown-content{

display:none;
position:absolute;
background:#607AB4;
top:45px;
left:0;
min-width:140px;
border-radius:6px;
overflow:hidden;
}

.dropdown-content a{

display:block;
color:white;
padding:10px;
text-decoration:none;
}

.dropdown-content a:hover{
background:#20376D;
}

.dropdown:hover .dropdown-content{
display:block;
}

/* GRID */

.container{
padding:40px;
}

.section{
padding:50px;
}

.section h2{
font-size:45px;
margin-bottom:40px;
color: #20376D;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.card{
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border:2px solid #20376D;
border-radius:15px;
}

.download{
margin-top:15px;
padding:10px 25px;
border-radius:25px;
border:2px solid #20376D;
background:white;
cursor:pointer;
}

.download:hover{
background:black;
color:white;
}

  footer {
            background-color: #607AB4;
            padding: 40px 20px;
            text-align: center;
            color: white;
            border-top: 2px solid black;
            margin-top: 50px;
        }

        .footer-content p {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icons a img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 8px; /* Opcional: para redondear un poco los .jpg */
            transition: transform 0.3s ease;
        }

        .social-icons a img:hover {
            transform: scale(1.15);
        }
    
</style>
